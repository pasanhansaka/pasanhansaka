<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="35%"  stop-color="#0a0015"/>
      <stop offset="65%"  stop-color="#130030"/>
      <stop offset="100%" stop-color="#050010"/>
    </linearGradient>
    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00000000"/>
      <stop offset="25%"  stop-color="#9333ea"/>
      <stop offset="50%"  stop-color="#c084fc"/>
      <stop offset="75%"  stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>
    <radialGradient id="cg" cx="50%" cy="48%" r="45%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="ng">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="45" height="45" patternUnits="userSpaceOnUse">
      <path d="M45,0 L0,0 0,45" fill="none" stroke="#7c3aed" stroke-width="0.4" opacity="0.18"/>
    </pattern>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" y="3" fill="#ffffff" opacity="0.018"/>
    </pattern>
    <clipPath id="clip"><rect width="900" height="300"/></clipPath>
  </defs>
