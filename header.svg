    <text x="685" y="104" font-family="'Courier New',monospace" font-size="10" fill="#6d28d9" opacity="0.28">useEffect(() =&gt; {<animate attributeName="opacity" values="0.28;0.50;0.28" dur="5s" begin="0.4s" repeatCount="indefinite"/></text>
